services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: goaldrop
      POSTGRES_USER: goaldrop
      POSTGRES_PASSWORD: goaldrop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goaldrop -d goaldrop"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - goaldrop-postgres:/var/lib/postgresql/data

volumes:
  goaldrop-postgres:
